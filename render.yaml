services:
  - type: web
    name: dga-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: GEMINI_API_KEY
        value: ""

  - type: web
    name: dga-frontend
    env: docker
    dockerfilePath: frontend/Dockerfile
    envVars:
      - key: BACKEND_URL
        fromService:
          type: web
          name: dga-backend
          property: host